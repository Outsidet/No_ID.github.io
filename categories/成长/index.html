  <div class="search-modal" id="searchModal">

      <div class="logo">No ID</div>

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>

      </div>

    </div>
  </div>

  <script>
    // 1. 导航栏滚动毛玻璃效果
    const siteHeader = document.getElementById('siteHeader');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 10) {
        siteHeader.classList.add('scrolled');
      } else {
        siteHeader.classList.remove('scrolled');
      }
    });

    // 2. 话题下拉与毛玻璃遮罩交互
    const topicBtn = document.getElementById('topicBtn');
    const topicDropdown = document.getElementById('topicDropdown');
    const backdrop = document.getElementById('backdrop');

    function toggleTopicMenu() {
      topicDropdown.classList.toggle('active');
      backdrop.classList.toggle('active');
    }
    topicBtn.addEventListener('click', toggleTopicMenu);
    backdrop.addEventListener('click', toggleTopicMenu);


    // 3. 搜索功能交互
    const searchBtn = document.getElementById('searchBtn');
    const searchModal = document.getElementById('searchModal');
    const searchClose = document.getElementById('searchClose');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let searchData = [];

    // 封装统一的关闭动作
    function closeSearch() {
      searchModal.classList.remove('active'); 
      searchInput.value = ''; 
      searchResults.innerHTML = '';
    }

    searchBtn.onclick = () => {
      searchModal.classList.add('active');
      setTimeout(() => searchInput.focus(), 100); 
      if(searchData.length === 0) {
        fetch('/search.xml')
          .then(res => res.text())
          .then(str => {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(str, "text/xml");
            const entries = xmlDoc.getElementsByTagName("entry");
            for (let i = 0; i < entries.length; i++) {
              searchData.push({ title: entries[i].getElementsByTagName("title")[0].textContent, url: entries[i].getElementsByTagName("url")[0].textContent });
            }
          });
      }
    };

    // 触发关闭的情况 1：点击右上角的 Close 按钮
    searchClose.onclick = closeSearch;

    // 触发关闭的情况 2：点击周围的毛玻璃空白区域
    searchModal.addEventListener('click', (e) => {
      // 确保点击的是外层背景或外部容器，而不是点在输入框或链接上
      if (e.target === searchModal || e.target.classList.contains('search-container')) {
        closeSearch();
      }
    });

    searchInput.oninput = function() {
      const keyword = this.value.toLowerCase();
      searchResults.innerHTML = '';
      if(!keyword) return;
      const filtered = searchData.filter(item => item.title.toLowerCase().includes(keyword));
      filtered.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${item.url}">${item.title}</a>`;
        searchResults.appendChild(li);
      });
    };
  </script>
